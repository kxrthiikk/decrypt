<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Encrypt / Decrypt Tool</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="container">
    <h1>Encrypt / Decrypt Tool</h1>

    <div class="form-group mode-row">
        <label>
            <input type="radio" name="mode" value="decrypt" checked>
            Decrypt
        </label>

        <label>
            <input type="radio" name="mode" value="encrypt">
            Encrypt
        </label>
    </div>

    <div class="form-group">
        <label for="cipher-key">AES key (hex)</label>
        <input type="text" id="cipher-key" class="mono" spellcheck="false" autocomplete="off">
        <div class="hint">Same as <code>decrypt.php</code>: AES-256-CBC — 64 hex characters (32 bytes).</div>
    </div>

    <div id="decrypt-fields">
        <div class="form-group">
            <label for="payload">Payload (JSON)</label>
            <textarea id="payload" placeholder='{"id":"<iv-hex>","document":"<base64>"}'></textarea>
        </div>
    </div>

    <div id="encrypt-fields" style="display:none;">
        <div class="form-group">
            <label for="plaintext">Raw Payload (plaintext)</label>
            <textarea id="plaintext" placeholder='e.g. {"foo":"bar"}'></textarea>
        </div>

        <div class="form-group">
            <label for="encrypt_iv">IV (hex, optional)</label>
            <input type="text" id="encrypt_iv" placeholder="Leave empty for random IV">
            <div class="hint">If provided: exactly 32 hex characters (16-byte IV), same as PHP <code>encrypt_payload</code>.</div>
        </div>
    </div>

    <button id="submit-btn">Decrypt</button>

    <div id="error" class="error" style="display:none;"></div>

    <div id="result" class="result" style="display:none;">
        <div class="result-label"></div>
        <pre id="result-content"></pre>
    </div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/crypto-js/4.2.0/crypto-js.min.js" crossorigin="anonymous" referrerpolicy="no-referrer"></script>
<script src="script.js"></script>
</body>
</html>
